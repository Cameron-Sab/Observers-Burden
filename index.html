<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Observer's Burden</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;font-family:'Courier New',monospace}
#wrap{position:relative;width:800px;height:480px}
#c{display:block;width:800px;height:480px;image-rendering:pixelated;cursor:none}

/* UI OVERLAYS */
#hud{position:absolute;top:0;left:0;right:0;height:36px;background:linear-gradient(180deg,rgba(0,0,0,0.92)0%,transparent);display:none;align-items:center;padding:4px 14px;gap:18px;pointer-events:none}
#hud span{font-size:10px;color:#8ff;font-weight:bold;letter-spacing:1px}
#hp-bar-wrap{width:90px;height:8px;border:1px solid #4aa;background:#001;border-radius:1px;overflow:hidden}
#hp-bar{height:100%;background:linear-gradient(90deg,#0ff,#0a8);transition:width 0.3s}
#en-bar-wrap{width:70px;height:8px;border:1px solid #a4a;background:#001;border-radius:1px;overflow:hidden}
#en-bar{height:100%;background:linear-gradient(90deg,#f4f,#a0a);transition:width 0.3s}

/* DIALOGUE */
#dlg{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,rgba(0,0,12,0.97),rgba(0,4,20,0.95));border-top:2px solid #136;padding:12px 16px;display:none;min-height:110px;pointer-events:auto}
#dlg-top{display:flex;gap:10px;margin-bottom:8px}
#dlg-portrait{width:52px;height:52px;image-rendering:pixelated;border:2px solid #246;border-radius:3px;flex-shrink:0}
#dlg-right{flex:1}
#dlg-name{font-size:11px;font-weight:bold;color:#4df;margin-bottom:4px;letter-spacing:1px}
#dlg-text{font-size:11px;color:#cde;line-height:1.7}
#dlg-cont{font-size:9px;color:#468;animation:blink 1s step-end infinite;text-align:right}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* SCREENS */
.scr{position:absolute;inset:0;display:none;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:30px;z-index:20;pointer-events:auto}
.scr.on{display:flex}
#title-scr{background:radial-gradient(ellipse at 50% 60%,#030a1a,#000 80%)}
#title-scr h1{font-size:26px;font-weight:bold;color:#0cf;text-shadow:0 0 20px rgba(0,200,255,0.5),2px 2px 0 #004;line-height:1.6;margin-bottom:6px;letter-spacing:2px}
.t-sub{font-size:10px;color:#468;margin-bottom:24px;letter-spacing:3px}
#title-canvas{width:160px;height:80px;image-rendering:pixelated;margin-bottom:18px}
.big-btn{background:transparent;color:#0cf;border:2px solid #0cf;padding:14px 32px;font-size:13px;font-family:'Courier New',monospace;font-weight:bold;cursor:pointer;text-transform:uppercase;letter-spacing:2px;transition:all 0.3s;animation:pulse 2s ease-in-out infinite}
.big-btn:hover{background:#0cf;color:#000}
@keyframes pulse{0%,100%{box-shadow:0 0 8px rgba(0,200,255,0.2)}50%{box-shadow:0 0 25px rgba(0,200,255,0.5)}}
.t-hint{font-size:9px;color:#234;margin-top:14px}

#weapon-scr{background:rgba(0,0,0,0.9)}
#weapon-scr h2{font-size:16px;color:#ff0;font-weight:bold;margin-bottom:14px;letter-spacing:2px}
.weapon-box{background:rgba(0,20,40,0.8);border:2px solid #246;border-radius:6px;padding:16px;max-width:480px;margin-bottom:16px;text-align:left}
.weapon-title{font-size:13px;font-weight:bold;color:#4df;margin-bottom:8px}
.weapon-desc{font-size:10px;color:#9bc;line-height:1.8}
.weapon-formula{font-size:9px;color:#68a;margin-top:8px;padding:6px;border:1px solid #135;border-radius:3px;background:rgba(0,10,30,0.5)}

#end-scr{background:radial-gradient(ellipse at 50% 50%,#030a1a,#000 80%)}
#end-scr h1{font-size:22px;font-weight:bold;line-height:1.8;margin-bottom:12px}
.e-msg{font-size:11px;color:#9bc;line-height:1.8;max-width:500px;margin-bottom:18px}

.particle{position:absolute;pointer-events:none;z-index:25;animation:pfade linear forwards}
@keyframes pfade{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(0)}}
</style>
</head>
<body>
<div id="wrap">
<canvas id="c" width="400" height="240"></canvas>

<div id="hud">
  <span>HP</span><div id="hp-bar-wrap"><div id="hp-bar" style="width:100%"></div></div>
  <span>ENTROPY</span><div id="en-bar-wrap"><div id="en-bar" style="width:100%"></div></div>
  <span id="weapon-label">WEAPON: —</span>
  <span id="score-label">SOULS: 0</span>
</div>

<div id="dlg">
  <div id="dlg-top">
    <canvas id="dlg-portrait" width="26" height="26"></canvas>
    <div id="dlg-right">
      <div id="dlg-name"></div>
      <div id="dlg-text"></div>
    </div>
  </div>
  <div id="dlg-cont">[ SPACE / CLICK TO CONTINUE ]</div>
</div>

<div id="title-scr" class="scr on">
  <canvas id="title-canvas" width="80" height="40"></canvas>
  <h1>THE OBSERVER'S<br>BURDEN</h1>
  <div class="t-sub">A TALE OF FINITE PRECISION</div>
  <button class="big-btn" onclick="startGame()">BEGIN</button>
  <div class="t-hint">arrow keys / WASD to move — space to shoot / advance — Z/X switch weapons</div>
</div>

<div id="weapon-scr" class="scr">
  <h2 id="weapon-scr-title">WEAPON ACQUIRED</h2>
  <div class="weapon-box">
    <div class="weapon-title" id="ws-name"></div>
    <div class="weapon-desc" id="ws-desc"></div>
    <div class="weapon-formula" id="ws-formula"></div>
  </div>
  <button class="big-btn" onclick="closeWeaponScreen()">EQUIP</button>
</div>

<div id="end-scr" class="scr">
  <h1 id="end-title" style="color:#0cf">YOU HAVE RECLAIMED<br>YOUR SOUL</h1>
  <p class="e-msg" id="end-msg"></p>
  <button class="big-btn" onclick="location.reload()">PLAY AGAIN</button>
</div>
</div>
